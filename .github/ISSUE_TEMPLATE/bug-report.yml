name: Bug Report
description: Report a reproducible problem or unexpected behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clearly describe the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest reliable reproduction.
      placeholder: |
        1. Apply...
        2. Run...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happened instead?
    validations:
      required: true

  - type: input
    id: ai-tool
    attributes:
      label: AI Tool or Model
      description: Which agent, tool, or model was involved, if relevant?

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add logs, screenshots, links, or other useful context.
